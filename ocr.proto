syntax = "proto3";

package ocr;

service OCRService {
  // Process a single image
  rpc ProcessImage (ImageRequest) returns (OCRResult) {}

  // Process multiple images structure
  rpc ProcessBatch (BatchImageRequest) returns (BatchOCRResult) {}

  // Process multiple images structure with shared metadata
  rpc ProcessImages (MultiImageRequest) returns (BatchOCRResult) {}

  // Parse a Krungsri bank statement PDF and bulk-insert transactions
  rpc ProcessStatement (PDFStatementRequest) returns (StatementResult) {}
}

message ImageRequest {
  bytes image_data = 1;
  string filename = 2; 
  string username = 3;
  string type_of_expense = 4;
}

message BatchImageRequest {
  repeated ImageRequest requests = 1;
}

message MultiImageRequest {
  repeated bytes image_data = 1;
  string username = 2;
  string type_of_expense = 3;
}

message OCRResult {
  string amount = 1;
  string date = 2;
  string ref = 3;
  string raw_text = 4;
  string error = 5;
  string webhook_result = 6;
}

message BatchOCRResult {
  repeated OCRResult results = 1;
}

// ---- Bank statement PDF ----

message PDFStatementRequest {
  bytes pdf_data = 1;
  string username = 2;
}

message StatementTransaction {
  string datetime = 1;
  string transaction_type = 2;
  string withdrawal = 3;   // empty string if this is a deposit
  string deposit = 4;      // empty string if this is a withdrawal
  string balance = 5;
  string channel = 6;
  string details = 7;
}

message StatementResult {
  string account_name = 1;
  string account_number = 2;
  string branch = 3;
  string period_start = 4;
  string period_end = 5;
  repeated StatementTransaction transactions = 6;
  string withdrawal_total = 7;
  string deposit_total = 8;
  string error = 9;
}
